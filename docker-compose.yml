version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_database"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: erp_app
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@db:5432/erp_database
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --threads 2 run:app

volumes:
  postgres_data:
